# git-cliff configuration for GitLab and GitHub release notes.

[changelog]
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}\
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
{% if version %}
### Container image

```bash
docker pull ghcr.io/cwa-tw/claude_code_docker:{{ version | trim_start_matches(pat="v") }}
```
{% endif %}
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "^v?[0-9]+\\.[0-9]+\\.[0-9]+$"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactoring" },
  { message = "^doc", group = "<!-- 3 -->Documentation" },
  { message = "^perf", group = "<!-- 4 -->Performance" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^ci", group = "<!-- 6 -->CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "<!-- 7 -->Maintenance" },
  { message = "^revert", group = "<!-- 8 -->Reverts" },
  { message = ".*", group = "<!-- 9 -->Other" },
]
filter_commits = false
fail_on_unmatched_commit = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
